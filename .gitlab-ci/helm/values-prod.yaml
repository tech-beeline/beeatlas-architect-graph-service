env:
  SPRING_NEO4J_URI: "vault:eafdmmart/data/prod/fdm#spring.neo4j.uri"
  SPRING_NEO4J_AUTHENTICATION_USERNAME: "vault:eafdmmart/data/prod/fdm#spring.neo4j.authentication.username"
  SPRING_NEO4J_AUTHENTICATION_PASSWORD: "vault:eafdmmart/data/prod/fdm#spring.neo4j.authentication.password"
  SPRING_REDIS_HOST: "beatlas-red1.database-prod-redis.cloud.vimpelcom.ru"
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_PASSWORD: "vault:eafdmmart/data/prod/fdm#redispassword"
  INTEGRATION_AUTHSSO_SERVER_URL: "vault:eafdmmart/data/prod/ambassador#authsso"
  INTEGRATION_PRODUCT_SERVER_URL: "vault:eafdmmart/data/prod/fdm#productsserver"

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 1500Mi
  requests:
    cpu: 100m
    memory: 300Mi
