env:
  SPRING_NEO4J_URI: "vault:eafdmmart/data/test/func/fdm#spring.neo4j.uri"
  SPRING_NEO4J_AUTHENTICATION_USERNAME: "vault:eafdmmart/data/test/func/fdm#spring.neo4j.authentication.username"
  SPRING_NEO4J_AUTHENTICATION_PASSWORD: "vault:eafdmmart/data/test/func/fdm#spring.neo4j.authentication.password"
  SPRING_SERVICES_DOCUMENTS_URL: "http://document-service-func:8080"

podAnnotations:
  vault.security.banzaicloud.io/vault-addr: "https://vault-test.vimpelcom.ru/"

ingress:
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type, authorization
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, DELETE, OPTIONS
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: 'true'

resources:
  limits:
    cpu: 250m
    memory: 500Mi
  requests:
    cpu: 50m
    memory: 100Mi
