env:
  SPRING_NEO4J_URI: "vault:eafdmmart/data/dev/fdm#spring.neo4j.uri"
  SPRING_NEO4J_AUTHENTICATION_USERNAME: "vault:eafdmmart/data/dev/fdm#spring.neo4j.authentication.username"
  SPRING_NEO4J_AUTHENTICATION_PASSWORD: "vault:eafdmmart/data/dev/fdm#spring.neo4j.authentication.password"
  SPRING_SERVICES_DOCUMENTS_URL: "http://document-service-dev:8080"
  SPRING_RABBITMQ_TEMPLATE_EXCHANGE: "vault:eafdmmart/data/dev/fdm#rabbitmqtemplateexchange"
  SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: "vault:eafdmmart/data/dev/fdm#rabbitmqtemplateroutingkey"
  SPRING_RABBITMQ_HOST: "vault:eafdmmart/data/dev/fdm#rabbitmqhost"
  SPRING_RABBITMQ_PORT: "vault:eafdmmart/data/dev/fdm#rabbitmqport"
  SPRING_RABBITMQ_USERNAME: "vault:eafdmmart/data/dev/fdm#rabbitmqusername"
  SPRING_RABBITMQ_PASSWORD: "vault:eafdmmart/data/dev/fdm#rabbitmqpassword"
  SPRING_RABBITMQ_VIRTUAL_HOST: "vault:eafdmmart/data/dev/fdm#rabbitmqvirtualhost"
  SPRING_REDIS_HOST: "vault:eafdmmart/data/dev/fdm#redishost"
  SPRING_REDIS_PORT: "vault:eafdmmart/data/dev/fdm#redisport"
  INTEGRATION_AUTHSSO_SERVER_URL: "vault:eafdmmart/data/dev/ambassador#authsso"

podAnnotations:
  vault.security.banzaicloud.io/vault-addr: "https://vault-test.vimpelcom.ru/"

ingress:
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type, authorization
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, DELETE, OPTIONS
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: 'true'

resources:
  limits:
    cpu: 250m
    memory: 500Mi
  requests:
    cpu: 50m
    memory: 100Mi
